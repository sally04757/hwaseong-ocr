<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화성시 보조금 신청서 OCR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 40px 20px;
      color: #1a202c;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a56db;
    }

    header p {
      margin-top: 8px;
      color: #6b7280;
      font-size: 0.95rem;
    }

    /* 업로드 영역 */
    .upload-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .drop-zone {
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8faff;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #1a56db;
      background: #eff6ff;
    }

    .drop-zone .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .drop-zone p {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .drop-zone strong {
      color: #1a56db;
    }

    #fileInput { display: none; }

    /* 미리보기 */
    #preview-wrap {
      display: none;
      margin-top: 20px;
      text-align: center;
    }

    #preview-wrap img {
      max-width: 100%;
      max-height: 360px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }

    #preview-name {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #6b7280;
    }

    /* 버튼 */
    .btn {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #1a56db;
      color: white;
      width: 100%;
      margin-top: 20px;
    }

    .btn-primary:hover { background: #1e40af; }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }

    /* 로딩 */
    #loading {
      display: none;
      text-align: center;
      padding: 24px;
      color: #1a56db;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid #bfdbfe;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 결과 영역 */
    #result-card {
      display: none;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    #result-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a202c;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 전체 텍스트 */
    .result-section { margin-bottom: 28px; }

    .result-section h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    #full-text-box {
      background: #f8faff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 80px;
    }

    /* 상세 항목 테이블 */
    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .detail-table th {
      background: #f1f5f9;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: #374151;
      border-bottom: 2px solid #e5e7eb;
    }

    .detail-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: middle;
    }

    .detail-table tr:hover td { background: #f9fafb; }

    /* 신뢰도 배지 */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .badge-high   { background: #d1fae5; color: #065f46; }
    .badge-mid    { background: #fef3c7; color: #92400e; }
    .badge-low    { background: #fee2e2; color: #991b1b; }

    /* 복사 버튼 */
    #copy-btn {
      background: #f1f5f9;
      color: #374151;
      border: 1px solid #e5e7eb;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 10px;
    }

    #copy-btn:hover { background: #e2e8f0; }

    /* 에러 */
    #error-box {
      display: none;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 16px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📄 화성시 보조금 신청서 OCR</h1>
      <p>이미지를 업로드하면 AI가 손글씨를 자동으로 판독합니다</p>
    </header>

    <!-- 업로드 카드 -->
    <div class="upload-card">
      <div class="drop-zone" id="dropZone">
        <div class="icon">🖼️</div>
        <p><strong>클릭하거나 이미지를 여기에 드래그하세요</strong></p>
        <p style="margin-top:6px; font-size:0.85rem;">JPG, PNG, BMP, TIFF · 최대 10MB</p>
      </div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/bmp,image/tiff" />

      <div id="preview-wrap">
        <img id="preview-img" src="" alt="미리보기" />
        <p id="preview-name"></p>
      </div>

      <div id="error-box"></div>

      <button class="btn btn-primary" id="submitBtn" disabled>
        🔍 OCR 분석 시작
      </button>

      <div id="loading">
        <span class="spinner"></span> AI가 텍스트를 판독 중입니다...
      </div>
    </div>

    <!-- 결과 카드 -->
    <div id="result-card">
      <h2>✅ 판독 결과</h2>

      <div class="result-section">
        <h3>전체 텍스트</h3>
        <div id="full-text-box"></div>
        <button id="copy-btn">📋 클립보드에 복사</button>
      </div>

      <div class="result-section">
        <h3>항목별 상세 결과</h3>
        <table class="detail-table">
          <thead>
            <tr>
              <th>#</th>
              <th>판독 텍스트</th>
              <th>신뢰도</th>
            </tr>
          </thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ─── 설정 ───────────────────────────────────────────────
    const API_URL = "http://localhost:8000/ocr";  // 백엔드 주소

    // ─── 요소 참조 ───────────────────────────────────────────
    const dropZone   = document.getElementById("dropZone");
    const fileInput  = document.getElementById("fileInput");
    const submitBtn  = document.getElementById("submitBtn");
    const previewWrap= document.getElementById("preview-wrap");
    const previewImg = document.getElementById("preview-img");
    const previewName= document.getElementById("preview-name");
    const loading    = document.getElementById("loading");
    const resultCard = document.getElementById("result-card");
    const fullTextBox= document.getElementById("full-text-box");
    const detailTbody= document.getElementById("detail-tbody");
    const errorBox   = document.getElementById("error-box");
    const copyBtn    = document.getElementById("copy-btn");

    let selectedFile = null;

    // ─── 드래그 앤 드롭 ──────────────────────────────────────
    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    // ─── 파일 선택 처리 ──────────────────────────────────────
    function handleFile(file) {
      selectedFile = file;
      showError("");

      // 미리보기
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewName.textContent = `📎 ${file.name}  (${(file.size / 1024).toFixed(1)} KB)`;
        previewWrap.style.display = "block";
      };
      reader.readAsDataURL(file);

      submitBtn.disabled = false;
      resultCard.style.display = "none";
    }

    // ─── OCR 요청 ────────────────────────────────────────────
    submitBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      setLoading(true);
      showError("");
      resultCard.style.display = "none";

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: formData,
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "서버 오류가 발생했습니다.");
        }

        renderResult(data);

      } catch (err) {
        showError("오류: " + err.message);
      } finally {
        setLoading(false);
      }
    });

    // ─── 결과 렌더링 ──────────────────────────────────────────
    function renderResult(data) {
      // 전체 텍스트
      fullTextBox.textContent = data.full_text || "(인식된 텍스트 없음)";

      // 상세 테이블
      detailTbody.innerHTML = "";
      data.details.forEach((item, i) => {
        const conf = item.confidence;
        let badgeClass = "badge-high";
        if (conf < 0.7) badgeClass = "badge-low";
        else if (conf < 0.9) badgeClass = "badge-mid";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${escapeHtml(item.text)}</td>
          <td><span class="badge ${badgeClass}">${(conf * 100).toFixed(1)}%</span></td>
        `;
        detailTbody.appendChild(tr);
      });

      resultCard.style.display = "block";
      resultCard.scrollIntoView({ behavior: "smooth" });
    }

    // ─── 복사 버튼 ───────────────────────────────────────────
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(fullTextBox.textContent).then(() => {
        copyBtn.textContent = "✅ 복사됨!";
        setTimeout(() => copyBtn.textContent = "📋 클립보드에 복사", 1500);
      });
    });

    // ─── 유틸 ────────────────────────────────────────────────
    function setLoading(on) {
      loading.style.display = on ? "block" : "none";
      submitBtn.disabled = on;
    }

    function showError(msg) {
      errorBox.style.display = msg ? "block" : "none";
      errorBox.textContent = msg;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
